name: Deploy

on:
  push:
    branches: [main, develop]

jobs:
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kortai-website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install && npm run build

      - name: 部署到生产
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts
          cd out && tar -czf /tmp/deploy.tar.gz .
          scp /tmp/deploy.tar.gz ubuntu@${{ secrets.HOST }}:/tmp/
          ssh ubuntu@${{ secrets.HOST }} "
            sudo rm -rf /var/www/kortai/*
            sudo tar -xzf /tmp/deploy.tar.gz -C /var/www/kortai/
            sudo chown -R www-data:www-data /var/www/kortai/
          "

  deploy-test:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kortai-website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install && npm run build

      - name: 部署到测试环境
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY_TEST }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HOST_TEST }} >> ~/.ssh/known_hosts
          cd out && tar -czf /tmp/deploy.tar.gz .
          scp /tmp/deploy.tar.gz ubuntu@${{ secrets.HOST_TEST }}:/tmp/
          ssh ubuntu@${{ secrets.HOST_TEST }} "
            sudo rm -rf /var/www/kortai-test/*
            sudo tar -xzf /tmp/deploy.tar.gz -C /var/www/kortai-test/
            sudo chown -R www-data:www-data /var/www/kortai-test/
          "
