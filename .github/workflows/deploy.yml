name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kortai-website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖并构建
        run: |
          npm install
          npm run build
          echo "=== 构建产物 ==="
          ls -la out/

      - name: 部署到服务器
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts
          cd out
          tar -czf /tmp/deploy.tar.gz .
          scp /tmp/deploy.tar.gz ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/tmp/
          ssh ${{ secrets.USERNAME }}@${{ secrets.HOST }} "
            sudo rm -rf /var/www/kortai/*
            sudo tar -xzf /tmp/deploy.tar.gz -C /var/www/kortai/
            sudo chown -R www-data:www-data /var/www/kortai/
            echo '部署完成！文件数：'
            ls /var/www/kortai/ | wc -l
          "
